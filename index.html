<script type="module">
// ==========================================
// 1. PWA SERVICE WORKER
// ==========================================
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'spire-ide-v3';
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(()=>r)));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}

let state = {
  projects: [], currentProjectId: null, settings: {},
  editorInstance: null, diffInstance: null, currentFile: null, pendingChanges: null
};

const $ = id => document.getElementById(id);
mermaid.initialize({ startOnLoad: false, theme: 'default' });

// ==========================================
// 2. INDEXED DB (Projects, Vectors, Snapshots)
// ==========================================
const openDB = () => new Promise((resolve, reject) => {
  const req = indexedDB.open('spire-ide-db', 4);
  req.onupgradeneeded = e => {
    const db = e.target.result;
    if (!db.objectStoreNames.contains('projects')) db.createObjectStore('projects', { keyPath: 'id' });
    if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
    if (!db.objectStoreNames.contains('vectors')) {
      const vs = db.createObjectStore('vectors', { keyPath: 'id' });
      vs.createIndex('projectId', 'projectId');
    }
    if (!db.objectStoreNames.contains('snapshots')) {
      const sp = db.createObjectStore('snapshots', { keyPath: 'id' });
      sp.createIndex('projectId', 'projectId');
    }
  };
  req.onsuccess = () => resolve(req.result);
  req.onerror = reject;
});

const dbOp = async (store, op, data=null) => {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, op === 'getAll' || op === 'get' ? 'readonly' : 'readwrite');
    const s = tx.objectStore(store);
    let req;
    if (op === 'put') req = s.put(data);
    else if (op === 'delete') req = s.delete(data);
    else if (op === 'get') req = s.get(data);
    else req = s.getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = rej;
  });
};

// ==========================================
// 3. INLINE WEB WORKER (Embeddings & LLM)
// ==========================================
// We use a blob to create a worker dynamically without needing an external file
const workerCode = `
  import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1/dist/transformers.min.js';
  env.allowLocalModels = false; // Force CDN fetching for zero-install
  let embedder = null;
  let generator = null;

  self.onmessage = async (e) => {
    const { type, id, text, model } = e.data;
    try {
      if (type === 'embed') {
        if (!embedder) embedder = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
        const out = await embedder(text, { pooling: 'mean', normalize: true });
        self.postMessage({ id, type: 'embed_done', data: Array.from(out.data) });
      } else if (type === 'generate') {
        if (!generator || generator.model !== model) {
           generator = await pipeline('text-generation', model, { device: 'webgpu' });
           generator.model = model;
        }
        const out = await generator(text, { max_new_tokens: 300 });
        self.postMessage({ id, type: 'generate_done', data: out[0].generated_text });
      }
    } catch(err) {
      self.postMessage({ id, type: 'error', error: err.message });
    }
  };
`;
const aiWorker = new Worker(URL.createObjectURL(new Blob([workerCode], {type: 'application/javascript'})), {type: 'module'});
let workerJobCounter = 0;
const workerJobs = new Map();

aiWorker.onmessage = (e) => {
  const { id, type, data, error } = e.data;
  if (workerJobs.has(id)) {
    if (type === 'error') workerJobs.get(id).reject(new Error(error));
    else workerJobs.get(id).resolve(data);
    workerJobs.delete(id);
  }
};

const runWorkerJob = (msg) => new Promise((resolve, reject) => {
  const id = ++workerJobCounter;
  workerJobs.set(id, { resolve, reject });
  aiWorker.postMessage({ id, ...msg });
});

async function getEmbedding(text) {
  return await runWorkerJob({ type: 'embed', text: text.substring(0, 500) });
}

// Math Utility for Embeddings
function cosineSim(a, b) {
  let dot=0, magA=0, magB=0;
  for(let i=0;i<a.length;i++){ dot+=a[i]*b[i]; magA+=a[i]*a[i]; magB+=b[i]*b[i]; }
  return dot / (Math.sqrt(magA)*Math.sqrt(magB));
}

// Chunking Logic (Overlapping)
function chunkText(text, size=500, overlap=50) {
  const chunks = [];
  if (!text) return chunks;
  for(let i=0; i<text.length; i += size - overlap){
    chunks.push(text.slice(i, i+size));
    if (i + size >= text.length) break;
  }
  return chunks;
}

// ==========================================
// 4. LLM ROUTER (Hybrid)
// ==========================================
async function smartLLM(prompt, forceAPI = false) {
  const mode = state.settings.localModel || "none";
  
  // Try WebGPU Worker if enabled and prompt is short
  if (mode !== "none" && !forceAPI && prompt.length < 1500) {
    $('agentStatus').textContent = "🤖 Local WebGPU Thinking...";
    try {
      const res = await runWorkerJob({ type: 'generate', text: prompt, model: mode });
      $('agentStatus').textContent = "";
      return res;
    } catch(e) {
      console.warn("Local Worker failed, falling back to API", e);
    }
  }

  // Fallback / Main API
  if (!state.settings.apiKey) throw new Error("No API Key. Set it in settings.");
  $('agentStatus').textContent = "☁️ API Processing...";
  const res = await axios.post('https://api.groq.com/openai/v1/chat/completions', {
    model: 'llama3-8b-8192',
    messages: [
      { role: 'system', content: 'You are an elite AI system architect and coder. Output JSON only if asked.' }, 
      { role: 'user', content: prompt }
    ],
    temperature: 0.2
  }, { headers: { 'Authorization': `Bearer ${state.settings.apiKey}` } });
  
  $('agentStatus').textContent = "";
  return res.data.choices[0].message.content;
}

// ==========================================
// 5. AST & INTELLIGENCE ENGINE
// ==========================================
function parseAST(code) {
  try { return Babel.packages.parser.parse(code, { sourceType: "module", plugins: ["jsx", "typescript"] }); } 
  catch(e) { return null; }
}

// Expanded AST Walker
function walkAST(node, visitor) {
  if (!node) return;
  if (Array.isArray(node)) { node.forEach(n => walkAST(n, visitor)); return; }
  if (visitor[node.type]) visitor[node.type](node);
  for (const key in node) {
    if (typeof node[key] === 'object' && key !== 'loc') walkAST(node[key], visitor);
  }
}

function extractSymbols(code) {
  const ast = parseAST(code);
  const symbols = { functions: [], classes: [], imports: [], exports: [], calls: [], returns: 0 };
  if (!ast) return symbols;

  walkAST(ast, {
    FunctionDeclaration: n => { if(n.id) symbols.functions.push(n.id.name); },
    VariableDeclarator: n => { if(n.init?.type==='ArrowFunctionExpression' && n.id) symbols.functions.push(n.id.name); },
    ClassDeclaration: n => { if(n.id) symbols.classes.push(n.id.name); },
    ImportDeclaration: n => { if(n.source) symbols.imports.push(n.source.value); },
    ExportNamedDeclaration: n => { if(n.declaration?.id) symbols.exports.push(n.declaration.id.name); },
    CallExpression: n => { if(n.callee?.name) symbols.calls.push(n.callee.name); },
    ReturnStatement: () => { symbols.returns++; }
  });
  return symbols;
}

function buildProjectGraph(project) {
  const edges = [];
  project.files.forEach(f => {
    const sym = extractSymbols(f.content);
    sym.imports.forEach(imp => {
      const cleanImp = imp.replace(/['"\.\/]/g, '');
      const cleanFile = f.name.replace(/['"\.\/]/g, '');
      edges.push(`${cleanFile} --> ${cleanImp}`);
    });
  });
  return edges.length === 0 ? "graph TD\n  Project --> No_Dependencies" : `graph TD\n${edges.join('\n')}`;
}

// ==========================================
// 6. MINI-GIT & FILE SYSTEM
// ==========================================
function getLanguageFromFilename(filename) {
  if(filename.endsWith('.html')) return 'html';
  if(filename.endsWith('.css')) return 'css';
  if(filename.endsWith('.json')) return 'json';
  if(filename.endsWith('.ts') || filename.endsWith('.tsx')) return 'typescript';
  if(filename.endsWith('.md')) return 'markdown';
  if(filename.endsWith('.yml') || filename.endsWith('.yaml')) return 'yaml';
  return 'javascript';
}

async function saveSnapshot(projectId, label = "Manual Snapshot") {
  const proj = state.projects.find(p => p.id === projectId);
  if(!proj) return;
  // Deep clone project files
  const snapshot = {
    id: crypto.randomUUID(),
    projectId,
    label,
    timestamp: Date.now(),
    files: JSON.parse(JSON.stringify(proj.files))
  };
  await dbOp('snapshots', 'put', snapshot);
}

// ==========================================
// 7. AUTONOMOUS AGENT LOGIC
// ==========================================
async function runAutonomousAgent(request) {
  const proj = state.projects.find(p => p.id === state.currentProjectId);
  if(!proj) return alert("Select a project");
  
  appendChat('User', request);
  
  // 1. Semantic Search
  $('agentStatus').textContent = "🔍 Vector Search in Worker...";
  const vec = await getEmbedding(request);
  const allVectors = await dbOp('vectors', 'getAll');
  const projVecs = allVectors.filter(v => v.projectId === proj.id);
  projVecs.forEach(v => v.score = cosineSim(vec, v.embedding));
  const hits = projVecs.sort((a,b) => b.score - a.score).slice(0, 4);
  
  // 2. Build AST Context
  $('agentStatus').textContent = "🧠 Analyzing AST...";
  let context = hits.map(h => {
    const f = proj.files.find(file => file.name === h.fileName);
    if (!f) return '';
    const sym = extractSymbols(f.content);
    return `FILE: ${f.name}\nFUNCTIONS: ${sym.functions.join(',')}\nIMPORTS: ${sym.imports.join(',')}\nCONTENT:\n${f.content}`;
  }).join('\n\n---\n\n');
  
  if(!context) context = proj.files.slice(0,3).map(f => `FILE: ${f.name}\n${f.content}`).join('\n');

  const prompt = `
You are an autonomous AI Copilot. 
Context:
${context}

Task: ${request}

Plan the solution, output code changes safely.
Return ONLY valid JSON in this exact format:
{
  "explanation": "Brief reasoning",
  "changes": [
    { "file": "existingOrNewFilename.js", "newContent": "entire updated file code here" }
  ]
}
  `;

  try {
    const rawRes = await smartLLM(prompt, true);
    
    let jsonMatch = rawRes.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error("No JSON found in response");
    const plan = JSON.parse(jsonMatch[0]);
    
    appendChat('AI', `**Plan:** ${plan.explanation}\n\nGenerated ${plan.changes.length} file changes. Review diffs to accept.`);
    state.pendingChanges = plan.changes;
    
    if(plan.changes.length > 0) {
      previewDiff(plan.changes[0].file, plan.changes[0].newContent);
    }
  } catch(e) {
    appendChat('System Error', `Failed: ${e.message}`);
  }
}

// ==========================================
// 8. IDE & UI WORKFLOW
// ==========================================
function appendChat(role, text) {
  const div = document.createElement('div');
  div.className = `chat-msg ${role==='User'?'msg-user':'msg-ai'}`;
  const html = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
  div.innerHTML = `<div class="font-bold text-[10px] uppercase mb-1 opacity-75">${role}</div>${html}`;
  $('chatHistory').appendChild(div);
  $('chatHistory').scrollTop = $('chatHistory').scrollHeight;
}

function renderFileTree() {
  const proj = state.projects.find(p => p.id === state.currentProjectId);
  const tree = $('fileTree');
  tree.innerHTML = '';
  if(!proj) return;
  
  proj.files.forEach(f => {
    const el = document.createElement('div');
    el.className = `file-item ${state.currentFile?.name === f.name ? 'file-active' : ''}`;
    el.innerHTML = `📄 ${f.name}`;
    el.onclick = () => openFile(f);
    tree.appendChild(el);
  });
}

function openFile(file) {
  state.currentFile = file;
  renderFileTree();
  switchToView('editor');
  
  window.monacoReady.then(monaco => {
    const lang = getLanguageFromFilename(file.name);
    monaco.editor.setModelLanguage(state.editorInstance.getModel(), lang);
    state.editorInstance.setValue(file.content);
  });
}

function switchToView(view) {
  ['editor', 'diffEditor', 'graphView', 'diffActionBar'].forEach(id => $(id).classList.add('hidden'));
  ['tabCode', 'tabDiff', 'tabGraph'].forEach(id => $(id).classList.remove('text-white', 'bg-slate-700'));
  
  if (view === 'editor') {
    $('editor').classList.remove('hidden');
    $('tabCode').classList.add('text-white', 'bg-slate-700');
  } else if (view === 'diff') {
    $('diffEditor').classList.remove('hidden');
    $('tabDiff').classList.remove('hidden', 'text-slate-400');
    $('tabDiff').classList.add('text-white', 'bg-slate-700');
    $('diffActionBar').classList.remove('hidden');
  } else if (view === 'graph') {
    $('graphView').classList.remove('hidden');
    $('tabGraph').classList.remove('hidden', 'text-slate-400');
    $('tabGraph').classList.add('text-white', 'bg-slate-700');
  }
}

function previewDiff(filename, newContent) {
  const proj = state.projects.find(p => p.id === state.currentProjectId);
  const existingFile = proj.files.find(f => f.name === filename);
  const originalContent = existingFile ? existingFile.content : "// New File\n";
  
  switchToView('diff');
  
  window.monacoReady.then(monaco => {
    const lang = getLanguageFromFilename(filename);
    const origModel = monaco.editor.createModel(originalContent, lang);
    const modModel = monaco.editor.createModel(newContent, lang);
    state.diffInstance.setModel({ original: origModel, modified: modModel });
  });
}

// Diff Actions (Triggers Snapshot)
$('btnAcceptDiff').onclick = async () => {
  if(!state.pendingChanges) return;
  
  // Create snapshot BEFORE applying changes
  await saveSnapshot(state.currentProjectId, "Before AI Changes");
  
  const proj = state.projects.find(p => p.id === state.currentProjectId);
  for (const c of state.pendingChanges) {
    const f = proj.files.find(file => file.name === c.file);
    if(f) f.content = c.newContent;
    else proj.files.push({ name: c.file, content: c.newContent });
  }
  
  await dbOp('projects', 'put', proj);
  state.pendingChanges = null;
  
  appendChat('System', '✅ Changes Applied & Snapshot Saved');
  renderFileTree();
  if (state.currentFile) openFile(state.currentFile);
  else switchToView('editor');
};

$('btnRejectDiff').onclick = () => {
  state.pendingChanges = null;
  appendChat('System', '❌ Changes Rejected');
  switchToView('editor');
};

// ==========================================
// 9. INITIALIZATION & EVENTS
// ==========================================
async function init() {
  const rawProjects = await dbOp('projects', 'getAll');
  state.projects = rawProjects || [];
  
  const sets = await dbOp('settings', 'getAll');
  sets.forEach(s => state.settings[s.key] = s.value);
  if(state.settings.apiKey) $('apiKey').value = state.settings.apiKey;
  if(state.settings.localModel) $('localModelSelect').value = state.settings.localModel;
  
  renderProjectsList();

  const monaco = await window.monacoReady;
  state.editorInstance = monaco.editor.create($('editor'), {
    value: "// Select a project and file to begin",
    language: "javascript", theme: "vs-dark", automaticLayout: true, minimap: { enabled: false }
  });
  state.diffInstance = monaco.editor.createDiffEditor($('diffEditor'), {
    theme: "vs-dark", automaticLayout: true
  });
  
  state.editorInstance.onDidChangeModelContent(() => {
    if(state.currentFile && !$('editor').classList.contains('hidden')) {
      state.currentFile.content = state.editorInstance.getValue();
      const proj = state.projects.find(p => p.id === state.currentProjectId);
      if(proj) dbOp('projects', 'put', proj); 
    }
  });

  // iPhone PWA smooth focus
  $('aiInput').addEventListener('focus', e => setTimeout(() => e.target.scrollIntoView({ behavior: 'smooth' }), 300));
}

// Nav Tabs
document.querySelectorAll('.tab-btn').forEach(b => b.onclick = (e) => {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active', 'text-slate-200'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
  e.target.classList.add('tab-active', 'text-slate-200');
  $(e.target.dataset.tab).classList.remove('hidden');
});

// View Tabs
$('tabCode').onclick = () => switchToView('editor');
$('tabDiff').onclick = () => switchToView('diff');
$('tabGraph').onclick = () => switchToView('graph');

$('btnShowGraph').onclick = () => {
  const proj = state.projects.find(p => p.id === state.currentProjectId);
  if(!proj) return;
  switchToView('graph');
  $('mermaidGraph').removeAttribute('data-processed');
  $('mermaidGraph').innerHTML = buildProjectGraph(proj);
  mermaid.run({ nodes: [$('mermaidGraph')] });
};

// Git History Modal
$('btnHistory').onclick = async () => {
  const snaps = await dbOp('snapshots', 'getAll');
  const projSnaps = snaps.filter(s => s.projectId === state.currentProjectId).sort((a,b) => b.timestamp - a.timestamp);
  
  const list = $('historyList');
  list.innerHTML = '';
  projSnaps.forEach(s => {
    const d = new Date(s.timestamp).toLocaleString();
    const el = document.createElement('div');
    el.className = 'bg-slate-700 p-2 rounded flex justify-between items-center text-sm';
    el.innerHTML = `<div><div class="font-bold">${s.label}</div><div class="text-xs text-slate-400">${d}</div></div>
      <button class="bg-blue-600 px-2 py-1 rounded text-xs hover:bg-blue-500">Restore</button>`;
    el.querySelector('button').onclick = async () => {
      const proj = state.projects.find(p => p.id === state.currentProjectId);
      proj.files = s.files;
      await dbOp('projects', 'put', proj);
      renderFileTree();
      appendChat('System', `⏪ Restored snapshot: ${s.label}`);
      $('historyModal').classList.add('hidden');
    };
    list.appendChild(el);
  });
  $('historyModal').classList.remove('hidden');
};

// Projects
function renderProjectsList() {
  const list = $('projectsList');
  list.innerHTML = '';
  state.projects.forEach(p => {
    const div = document.createElement('div');
    div.className = 'flex justify-between items-center bg-slate-50 p-3 rounded border border-slate-200 cursor-pointer hover:bg-slate-100';
    div.innerHTML = `<div class="font-medium">${p.name} <span class="text-xs text-slate-400">(${p.files.length} files)</span></div>`;
    div.onclick = () => loadProject(p.id);
    list.appendChild(div);
  });
}

async function loadProject(id) {
  state.currentProjectId = id;
  const proj = state.projects.find(p => p.id === id);
  $('activeProjectBadge').textContent = proj.name;
  $('activeProjectBadge').classList.remove('hidden');
  
  document.querySelector('[data-tab="workspace"]').click();
  renderFileTree();
  if(proj.files.length > 0) openFile(proj.files[0]);
  appendChat('System', `Project **${proj.name}** loaded.`);
}

$('addProject').onclick = async () => {
  const name = $('newProjName').value || `Project_${Date.now()}`;
  const fileInput = $('projectFile').files;
  if(fileInput.length === 0) return alert("Select files");
  
  const files = [];
  for (let f of fileInput) files.push({ name: f.name, content: await f.text() });
  
  const project = { id: crypto.randomUUID(), name, files };
  state.projects.push(project);
  await dbOp('projects', 'put', project);
  await saveSnapshot(project.id, "Initial Import");
  
  // Index vectors using Web Worker
  $('addProject').textContent = "Indexing AST & Vectors...";
  for (let file of files) {
    const chunks = chunkText(file.content);
    for(let c of chunks) {
      const embedding = await getEmbedding(c);
      await dbOp('vectors', 'put', { id: crypto.randomUUID(), projectId: project.id, fileName: file.name, content: c, embedding });
    }
  }
  
  $('addProject').textContent = "Create & Index Project";
  $('newProjName').value = '';
  renderProjectsList();
  loadProject(project.id);
};

// Settings
$('saveSettings').onclick = async () => {
  await dbOp('settings', 'put', { key: 'apiKey', value: $('apiKey').value });
  await dbOp('settings', 'put', { key: 'localModel', value: $('localModelSelect').value });
  state.settings.apiKey = $('apiKey').value;
  state.settings.localModel = $('localModelSelect').value;
  alert("Settings Saved");
};

// AI Actions
$('btnSendAgent').onclick = () => {
  const text = $('aiInput').value.trim();
  if(!text) return;
  $('aiInput').value = '';
  runAutonomousAgent(text);
};

$('btnRefactor').onclick = async () => {
  const sel = state.editorInstance.getModel().getValueInRange(state.editorInstance.getSelection());
  if(!sel) return alert("Select code in editor first");
  runAutonomousAgent(`Refactor this code:\n\n${sel}\n\nMake it robust. File context: ${state.currentFile.name}`);
};

$('btnGenTests').onclick = async () => {
  if(!state.currentFile) return;
  runAutonomousAgent(`Generate unit tests for the file ${state.currentFile.name}. Create a new file named ${state.currentFile.name.split('.')[0]}.test.js`);
};

// CI/CD Generator
$('btnGenCI').onclick = async () => {
  const proj = state.projects.find(p => p.id === state.currentProjectId);
  if(!proj) return;
  runAutonomousAgent(`Generate a GitHub Actions CI workflow for this project to run tests and linting.
  Files in project: ${proj.files.map(f=>f.name).join(', ')}
  Create the file at .github/workflows/ci.yml`);
};

$('btnAnalyzeAST').onclick = async () => {
  if(!state.currentFile) return;
  const sym = extractSymbols(state.currentFile.content);
  appendChat('AST Engine', `**Analysis for ${state.currentFile.name}**\n\n- Functions: ${sym.functions.join(', ')}\n- Classes: ${sym.classes.join(', ')}\n- Imports: ${sym.imports.join(', ')}\n- Calls: ${sym.calls.join(', ')}\n- Total Returns: ${sym.returns}`);
};

init();
</script>
