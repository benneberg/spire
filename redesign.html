<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nexus AI Assistant</title>
  <link rel="icon" href="image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%236366f1%22/></svg>">
  
  <!-- Tailwind & Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  
  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: {
            dark: '#0B0F19',
            surface: '#151925',
            primary: '#6366f1', // Indigo
            accent: '#06b6d4',  // Cyan
            success: '#10b981',
            glass: 'rgba(21, 25, 37, 0.7)',
          }
        }
      }
    }
  </script>

  <style>
    /* --- Core Animations --- */
    @keyframes gradient-xy {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 10px rgba(99, 102, 241, 0.2); }
      50% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body {
      background-color: #0B0F19;
      color: #e2e8f0;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* --- Background Effects --- */
    .bg-grid {
      background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -2;
      pointer-events: none;
    }

    .ambient-orb {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      z-index: -1;
      animation: float 10s ease-in-out infinite;
      pointer-events: none;
    }
    .orb-1 { background: #6366f1; top: -50px; left: -50px; }
    .orb-2 { background: #06b6d4; bottom: -50px; right: -50px; animation-delay: 2s; }

    /* --- Glassmorphism Components --- */
    .glass-panel {
      background: rgba(21, 25, 37, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .nav-item.active {
      color: #6366f1;
      text-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
    }
    .nav-item.active svg { stroke-width: 2.5px; }

    /* --- Scrollbar --- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

    /* --- Utilities --- */
    .animate-enter { animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .hidden { display: none !important; }
    
    .chat-bubble-user {
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      border-bottom-right-radius: 2px;
    }
    .chat-bubble-ai {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(255,255,255,0.05);
      border-bottom-left-radius: 2px;
    }

    /* --- Inputs --- */
    input, select, textarea {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      transition: all 0.3s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }
    
    /* Fix for Select Arrow */
    select {
      appearance: none;
      background-image: url("image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 0.5rem center;
      background-repeat: no-repeat;
      background-size: 1.5em 1.5em;
    }
  </style>
</head>
<body class="flex flex-col h-screen text-sm selection:bg-indigo-500 selection:text-white">

  <!-- Ambient Background -->
  <div class="bg-grid"></div>
  <div class="ambient-orb orb-1"></div>
  <div class="ambient-orb orb-2"></div>

  <!-- Top Header -->
  <header class="fixed top-0 w-full z-40 glass-panel border-b-0 rounded-b-2xl px-4 py-3 flex justify-between items-center animate-enter">
    <div class="flex items-center gap-3">
      <div class="relative">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-indigo-500/20">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-dark"></span>
      </div>
      <div>
        <h1 class="font-bold tracking-wide text-base leading-none">NEXUS<span class="text-indigo-400 font-light">AI</span></h1>
        <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1">Runtime v3.0</p>
      </div>
    </div>
    
    <!-- System Status Pill -->
    <div class="flex items-center gap-2 px-3 py-1 rounded-full bg-black/30 border border-white/5">
      <div class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
      <span class="text-xs font-mono text-emerald-400">ONLINE</span>
    </div>
  </header>

  <!-- Main Content Area -->
  <!-- Added pb-24 to ensure content isn't hidden behind bottom nav -->
  <main class="flex-1 pt-20 pb-24 px-4 overflow-y-auto scroll-smooth relative z-10" id="mainContainer">
    
    <!-- VIEW: CHAT (Default) -->
    <section id="view-chat" class="tab-view flex flex-col h-full animate-enter">
      
      <!-- Role & Project Selectors -->
      <div class="grid grid-cols-2 gap-2 mb-4">
        <div class="glass-panel p-2 rounded-xl relative group">
          <label class="text-[10px] text-gray-400 uppercase font-bold ml-1">Expert Role</label>
          <select id="roleSelect" class="w-full bg-transparent text-white appearance-none pt-1 pl-1 focus:ring-0 border-none pr-8">
            <!-- Populated via JS -->
          </select>
        </div>
        
        <div class="glass-panel p-2 rounded-xl relative">
          <label class="text-[10px] text-gray-400 uppercase font-bold ml-1">Context</label>
          <select id="projectSelect" class="w-full bg-transparent text-white appearance-none pt-1 pl-1 focus:ring-0 border-none pr-8">
            <option value="">No Context</option>
          </select>
        </div>
      </div>

      <!-- Quick Actions Chips -->
      <div id="quickActions" class="flex gap-2 overflow-x-auto pb-2 mb-2 no-scrollbar">
        <!-- Injected via JS -->
      </div>

      <!-- Chat Stream -->
      <div id="chatBox" class="flex-1 flex flex-col gap-3 pb-4 overflow-y-auto min-h-[400px]">
        <!-- Messages go here -->
        <div class="text-center text-gray-500 text-xs mt-10 opacity-50">
          SYSTEM READY<br>AWAITING INPUT
        </div>
      </div>

      <!-- Input Area -->
      <div class="mt-auto pt-2 relative z-50">
        <div class="glass-panel rounded-2xl p-2 flex items-end gap-2 shadow-lg shadow-indigo-900/20">
           <button id="newChatBtn" class="p-3 text-gray-400 hover:text-white transition-colors rounded-xl hover:bg-white/5">
             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
           </button>
           <textarea id="chatInput" rows="1" class="w-full bg-transparent border-none focus:ring-0 resize-none py-3 text-white placeholder-gray-500" placeholder="Ask Nexus..."></textarea>
           <button id="sendChat" class="p-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl transition-all shadow-lg shadow-indigo-600/30 active:scale-95">
             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
           </button>
        </div>
      </div>
    </section>

    <!-- VIEW: PROJECTS -->
    <section id="view-projects" class="tab-view hidden animate-enter">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">Projects</h2>
        <button onclick="document.getElementById('addProjectModal').classList.remove('hidden')" class="bg-white/10 hover:bg-white/20 p-2 rounded-lg transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
        </button>
      </div>

      <div id="projectsList" class="space-y-3">
        <!-- Project Cards -->
      </div>
    </section>

    <!-- VIEW: SETTINGS / EXPERTS -->
    <section id="view-settings" class="tab-view hidden animate-enter">
      <h2 class="text-xl font-bold mb-4">Configuration</h2>
      
      <div class="glass-panel rounded-xl p-4 mb-6 space-y-4">
        <div class="flex items-center justify-between border-b border-white/5 pb-2">
          <h3 class="font-semibold text-indigo-300">API Connection</h3>
          <span class="text-xs bg-green-500/20 text-green-400 px-2 py-0.5 rounded">Groq</span>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">API Key</label>
          <input type="password" id="apiKey" class="w-full rounded-lg p-2.5 text-sm" placeholder="sk-..." />
        </div>
        <div class="grid grid-cols-2 gap-3">
           <div>
             <label class="text-xs text-gray-400 block mb-1">Model</label>
             <select id="modelSelect" class="w-full rounded-lg p-2.5 text-sm"><option>Loading...</option></select>
           </div>
           <div>
             <label class="text-xs text-gray-400 block mb-1">Temp: <span id="tempValue">0.7</span></label>
             <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" class="w-full accent-indigo-500 h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer">
           </div>
        </div>
        <button id="saveSettings" class="w-full bg-indigo-600 hover:bg-indigo-500 py-2.5 rounded-lg font-medium transition shadow-lg shadow-indigo-600/20">Save Configuration</button>
      </div>

      <div class="flex justify-between items-center mb-3">
        <h3 class="font-bold text-gray-200">Experts Library</h3>
        <button id="addExpertBtn" class="text-xs text-indigo-400 font-semibold uppercase tracking-wider">+ New Expert</button>
      </div>
      <div id="expertsList" class="space-y-3 pb-10"></div>
    </section>

  </main>

  <!-- Bottom Navigation Bar -->
  <!-- Increased Z-Index to 50 to sit above content, but Input has z-50 too -->
  <nav class="fixed bottom-0 w-full z-40 glass-panel border-t border-white/10 pb-safe">
    <div class="flex justify-around items-center h-16">
      <button class="nav-item active flex flex-col items-center gap-1 w-full h-full justify-center text-gray-500 hover:text-indigo-400 transition-all" data-target="view-chat">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
        <span class="text-[10px] font-medium">Chat</span>
      </button>
      <button class="nav-item flex flex-col items-center gap-1 w-full h-full justify-center text-gray-500 hover:text-indigo-400 transition-all" data-target="view-projects">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
        <span class="text-[10px] font-medium">Projects</span>
      </button>
      <button class="nav-item flex flex-col items-center gap-1 w-full h-full justify-center text-gray-500 hover:text-indigo-400 transition-all" data-target="view-settings">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        <span class="text-[10px] font-medium">Config</span>
      </button>
    </div>
  </nav>

  <!-- MODALS (Hidden by default) -->

  <!-- Add/Edit Project Modal -->
  <div id="addProjectModal" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
    <div class="glass-panel w-full max-w-md rounded-2xl p-5 animate-enter border border-white/10">
      <h3 class="text-lg font-bold mb-4">Ingest Project</h3>
      <div class="space-y-3">
        <div>
          <label class="text-xs text-gray-400">Source URLs (One per line)</label>
          <textarea id="projectUrls" class="w-full rounded-lg p-2 text-sm h-20" placeholder="https://github.com/..."></textarea>
        </div>
        <div>
          <label class="text-xs text-gray-400">Manual Code Snippet</label>
          <textarea id="manualCode" class="w-full rounded-lg p-2 text-sm font-mono h-20" placeholder="Paste code..."></textarea>
        </div>
        <div class="border border-dashed border-gray-600 rounded-lg p-4 text-center">
          <input type="file" id="projectFile" multiple class="hidden" />
          <label for="projectFile" class="cursor-pointer text-indigo-400 text-xs font-semibold hover:text-indigo-300">UPLOAD FILES / ZIP</label>
        </div>
      </div>
      <div class="flex gap-2 mt-5">
        <button onclick="document.getElementById('addProjectModal').classList.add('hidden')" class="flex-1 py-2.5 rounded-lg bg-gray-700 text-white font-medium">Cancel</button>
        <button id="addProject" class="flex-1 py-2.5 rounded-lg bg-indigo-600 text-white font-medium shadow-lg shadow-indigo-600/20">Add Project</button>
      </div>
    </div>
  </div>

  <!-- Expert Modal -->
  <div id="expertModal" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
     <div class="glass-panel w-full max-w-md rounded-2xl p-5 animate-enter border border-white/10 max-h-[90vh] overflow-y-auto">
       <div class="flex justify-between items-center mb-4">
         <h3 class="text-lg font-bold" id="expertModalTitle">New Expert</h3>
         <button id="closeExpertModal" class="text-gray-400">&times;</button>
       </div>
       <input type="hidden" id="expertId" />
       <div class="space-y-3">
         <input type="text" id="expertName" placeholder="Expert Name (e.g. React Guru)" class="w-full rounded-lg p-2.5" />
         <input type="text" id="expertDomain" placeholder="Domain (e.g. Frontend Arch)" class="w-full rounded-lg p-2.5" />
         <textarea id="expertObjectives" placeholder="Key Objectives..." class="w-full rounded-lg p-2.5 h-20"></textarea>
         
         <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="text-[10px] text-gray-400">Temperature</label>
              <input type="range" id="expertTemp" min="0" max="2" step="0.1" value="0.7" class="w-full accent-indigo-500 h-1 bg-gray-700 rounded-lg">
            </div>
            <div>
               <label class="text-[10px] text-gray-400">Max Tokens</label>
               <input type="number" id="expertMaxTokens" value="1024" class="w-full rounded-lg p-1.5 text-sm">
            </div>
         </div>
         
         <input type="text" id="expertQuickActions" placeholder="Quick Actions (comma separated)" class="w-full rounded-lg p-2.5" />
       </div>
       <div class="flex gap-2 mt-5">
         <button id="deleteExpertBtn" class="hidden px-4 py-2.5 rounded-lg bg-red-500/20 text-red-400 border border-red-500/30">Delete</button>
         <button id="cancelExpert" class="flex-1 py-2.5 rounded-lg bg-gray-700 text-white font-medium">Cancel</button>
         <button id="saveExpert" class="flex-1 py-2.5 rounded-lg bg-indigo-600 text-white font-medium shadow-lg shadow-indigo-600/20">Save</button>
       </div>
     </div>
  </div>

  <!-- Project Detail/Inspection Modal -->
  <div id="projectDetailModal" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
    <div class="glass-panel w-full max-w-lg rounded-2xl p-5 animate-enter border border-white/10 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold">Project Inspection</h3>
        <button id="closeProjectModal" class="text-gray-400">&times;</button>
      </div>
      <input type="hidden" id="inspectProjectId" />
      
      <div class="space-y-3 mb-4">
        <div>
          <label class="text-xs text-gray-400">URLs</label>
          <div id="inspectUrls" class="text-xs bg-black/20 p-2 rounded text-gray-300 break-all"></div>
        </div>
        <div>
          <label class="text-xs text-gray-400">Files</label>
          <div id="inspectFiles" class="text-xs bg-black/20 p-2 rounded text-gray-300"></div>
        </div>
      </div>

      <div id="inspectionForm" class="border-t border-white/10 pt-4">
        <h4 class="font-bold text-sm mb-2 text-indigo-300">AI Analysis Tasks</h4>
        <div class="grid grid-cols-2 gap-2 mb-4">
          <label class="flex items-center gap-2 text-xs bg-white/5 p-2 rounded cursor-pointer">
            <input type="checkbox" id="taskSummarize" class="accent-indigo-500"> Summarize
          </label>
          <label class="flex items-center gap-2 text-xs bg-white/5 p-2 rounded cursor-pointer">
            <input type="checkbox" id="taskTechnical" class="accent-indigo-500"> Technical Desc
          </label>
          <label class="flex items-center gap-2 text-xs bg-white/5 p-2 rounded cursor-pointer">
            <input type="checkbox" id="taskCategorize" class="accent-indigo-500"> Categorize
          </label>
          <label class="flex items-center gap-2 text-xs bg-white/5 p-2 rounded cursor-pointer">
            <input type="checkbox" id="taskAppJson" class="accent-indigo-500"> Generate JSON
          </label>
        </div>
        <button id="submitProjectAnalysis" class="w-full bg-indigo-600 hover:bg-indigo-500 py-2 rounded-lg text-sm font-bold transition">Run Analysis</button>
      </div>

      <div id="artifactsList" class="mt-4 space-y-2 hidden">
        <h4 class="font-bold text-sm text-emerald-400">Generated Artifacts</h4>
        <!-- Artifacts injected here -->
      </div>
    </div>
  </div>

  <!-- Export Modal -->
  <div id="exportModal" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
    <div class="glass-panel w-full max-w-xs rounded-2xl p-5 animate-enter border border-white/10">
      <h3 class="font-bold mb-3">Export Chat</h3>
      <select id="exportFormat" class="w-full rounded-lg p-2 mb-3 bg-gray-800 border-none">
        <option value="txt">Text File (.txt)</option>
        <option value="json">JSON Data (.json)</option>
        <option value="html">HTML Report (.html)</option>
      </select>
      <input type="text" id="exportFilename" placeholder="filename" class="w-full rounded-lg p-2 mb-4" />
      <div class="flex gap-2">
        <button id="cancelExport" class="flex-1 py-2 rounded-lg bg-gray-700 text-sm">Cancel</button>
        <button id="confirmExport" class="flex-1 py-2 rounded-lg bg-indigo-600 text-sm font-bold">Download</button>
      </div>
    </div>
  </div>

<script>
/* -------------------------------------------------------------------------- */
/*                               LOGIC & STATE                                */
/* -------------------------------------------------------------------------- */

// --- Tab Switching Logic ---
const navItems = document.querySelectorAll('.nav-item');
const views = document.querySelectorAll('.tab-view');

navItems.forEach(item => {
  item.addEventListener('click', () => {
    // Update Nav UI
    navItems.forEach(n => n.classList.remove('active', 'text-indigo-400'));
    navItems.forEach(n => n.classList.add('text-gray-500'));
    item.classList.add('active', 'text-indigo-400');
    item.classList.remove('text-gray-500');

    // Switch View
    const targetId = item.getAttribute('data-target');
    views.forEach(v => v.classList.add('hidden'));
    document.getElementById(targetId).classList.remove('hidden');
    
    // Re-trigger animation
    const view = document.getElementById(targetId);
    view.classList.remove('animate-enter');
    void view.offsetWidth; // trigger reflow
    view.classList.add('animate-enter');
  });
});

// --- Prompt Builder ---
function buildExpertPrompt(role, domain, objectives) {
  return `You are ${role}, an expert in ${domain}. 
OBJECTIVE: ${objectives}

GUIDELINES:
1. Be concise but thorough. Use markdown formatting.
2. If context is provided, strictly adhere to it.
3. Do not hallucinate facts.
4. Provide actionable advice or code snippets where relevant.

CONTEXT:
{{CONTEXT}}

USER QUERY:

async function fetchModels(apiKey) {

  try {
    const res = await axios.get('https://api.groq.com/openai/v1/models', { headers: { 'Authorization': `Bearer ${apiKey}` } });
    const models = res.data.data.map(m => m.id).sort();

      opt.value = m; opt.textContent = m;
      sel.appendChild(opt);

  } catch (e) { console.error("Model fetch failed", e); }

async function generateArtifactContent(project, tasks) {
  const apiKey = localStorage.getItem('groqApiKey');
  if (!apiKey) {
    alert('Please set your Groq API key in Settings to generate AI insights.');
    return {};
  }

  let context = '';
  if (project.urls.length) context += `URLs: ${project.urls.join(', ')}\n`;
  if (project.code) context += `Code:\n${project.code}\n`;
  project.files.forEach(f => {
    context += `File: ${f.name}\n${f.content.substring(0, 1000)}...\n`;
  });

  const model = localStorage.getItem('groqModel') || 'llama3-8b-8192';
  const results = {};
  const promises = [];

  if (tasks.summarize) {
    promises.push(
      axios.post('https://api.groq.com/openai/v1/chat/completions', {
        model,
        messages: [{ role: 'user', content: `Summarize this project in 2-3 sentences:\n\n${context}` }],
        temperature: 0.7,
        max_tokens: 300
      }, { headers: { 'Authorization': `Bearer ${apiKey}` } })
      .then(res => { results.summary = res.data.choices?.[0]?.message?.content || 'Summary not available.'; })
    );
  }

  if (tasks.technical) {
    promises.push(
      axios.post('https://api.groq.com/openai/v1/chat/completions', {
        model,
        messages: [{ role: 'user', content: `Provide a technical description of this project (stack, architecture, key features):\n\n${context}` }],
        temperature: 0.5,
        max_tokens: 500
      }, { headers: { 'Authorization': `Bearer ${apiKey}` } })
      .then(res => { results.technical = res.data.choices?.[0]?.message?.content || 'Technical description not available.'; })
    );
  }

  if (tasks.categorize) {
    promises.push(
      axios.post('https://api.groq.com/openai/v1/chat/completions', {
        model,
        messages: [{ role: 'user', content: `Categorize this project. Return only a single category name (e.g., "E-commerce", "Productivity"):\n\n${context}` }],
        temperature: 0.3,
        max_tokens: 50
      }, { headers: { 'Authorization': `Bearer ${apiKey}` } })
      .then(res => { results.category = res.data.choices?.[0]?.message?.content?.trim() || 'Uncategorized'; })
    );
  }

  if (tasks.appJson) {
    promises.push(
      axios.post('https://api.groq.com/openai/v1/chat/completions', {
        model,
        messages: [{ role: 'user', content: `Generate a valid JSON object with these fields: title, description, url, category, tags (array), technologies (array). Use this context:\n\n${context}` }],
        temperature: 0.6,
        max_tokens: 500
      }, { headers: { 'Authorization': `Bearer ${apiKey}` } })
      .then(res => {
        let jsonStr = res.data.choices?.[0]?.message?.content || '{}';
        const match = jsonStr.match(/```(?:json)?\s*({[\s\S]*?})\s*```/);
        if (match) jsonStr = match[1];
        try { results.appJson = JSON.parse(jsonStr); } 
        catch (e) { results.appJson = { error: 'Failed to parse JSON', raw: jsonStr }; }
      })
    );
  }

  await Promise.all(promises);
  return results;
}

document.getElementById('submitProjectAnalysis').addEventListener('click', async () => {
  const id = document.getElementById('inspectProjectId').value;
  const project = projects.find(p => p.id === id);
  if (!project) return;

  const tasks = {
    summarize: document.getElementById('taskSummarize').checked,

// --- Chat Engine ---
let chatHistory = [];
let currentChatId = null;

function initChat() {
  const saved = localStorage.getItem('nexus_chats');
  if(saved) chatHistory = JSON.parse(saved);
  if(chatHistory.length === 0) createNewChat();
  else loadChat(chatHistory[0].id);
}

function createNewChat() {
  const chat = { id: Date.now().toString(), messages: [], title: 'New Session' };
  chatHistory.unshift(chat);
  currentChatId = chat.id;
  saveChats();
  renderChatMessages();
}

function loadChat(id) {
  currentChatId = id;
  renderChatMessages();
}

function saveChats() { localStorage.setItem('nexus_chats', JSON.stringify(chatHistory)); }

function renderChatMessages() {
  const box = document.getElementById('chatBox');
  box.innerHTML = '';
  const chat = chatHistory.find(c => c.id === currentChatId);
  
  if(!chat.messages.length) {
    box.innerHTML = `<div class="text-center text-gray-500 text-xs mt-10 opacity-50 animate-pulse">SYSTEM IDLE<br>READY FOR INPUT</div>`;
    return;
  }

  chat.messages.forEach(msg => {
    const div = document.createElement('div');
    div.className = `flex w-full ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`;
    
    const bubble = document.createElement('div');
    bubble.className = `max-w-[85%] p-3 rounded-2xl text-sm leading-relaxed shadow-md ${msg.role === 'user' ? 'chat-bubble-user text-white' : 'chat-bubble-ai text-gray-200'}`;
    
    // Simple markdown-ish parsing for bold/code
    let content = msg.content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    content = content.replace(/`([^`]+)`/g, '<code class="bg-black/30 px-1 rounded text-xs font-mono text-indigo-300">$1</code>');
    
    bubble.innerHTML = content;
    div.appendChild(bubble);
    box.appendChild(div);
  });
  
  box.scrollTop = box.scrollHeight;
}

document.getElementById('newChatBtn').onclick = createNewChat;

document.getElementById('sendChat').addEventListener('click', async () => {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  
  // Add User Message
  const chat = chatHistory.find(c => c.id === currentChatId);
  chat.messages.push({ role: 'user', content: text });
  chat.title = text.substring(0, 20) + '...';
  saveChats();
  renderChatMessages();
  input.value = '';
  
  // Loading State
  const box = document.getElementById('chatBox');
  const loader = document.createElement('div');
  loader.className = 'flex justify-start w-full animate-pulse';
  loader.innerHTML = '<div class="bg-white/10 px-3 py-2 rounded-2xl text-xs text-gray-400">Thinking...</div>';
  box.appendChild(loader);
  box.scrollTop = box.scrollHeight;

  // Prepare Request
  const apiKey = localStorage.getItem('groqApiKey');
  const roleId = document.getElementById('roleSelect').value;
  const expert = experts.find(e => e.id === roleId) || experts[0];
  const projectId = document.getElementById('projectSelect').value;
  
  let contextStr = "";
  if(projectId) {
    const proj = projects.find(p => p.id === projectId);
    if(proj) {
      contextStr += `PROJECT CONTEXT:\nURLs: ${proj.urls.join(', ')}\n`;
      if(proj.code) contextStr += `CODE SNIPPET:\n${proj.code}\n`;
      proj.files.forEach(f => {
        contextStr += `FILE: ${f.name}\n${f.content.substring(0, 500)}...\n`;
      });
      if(proj.enriched) {
        contextStr += `\nENRICHED DATA:\n${JSON.stringify(proj.enriched, null, 2)}\n`;
      }
    }
  }

  const systemPrompt = buildExpertPrompt(expert.name, expert.domain, expert.objectives)
    .replace('{{CONTEXT}}', contextStr || "No specific project context.")
    .replace('{{USER_QUERY}}', text);

  try {
    const model = localStorage.getItem('groqModel') || 'llama3-8b-8192';
    const res = await axios.post('https://api.groq.com/openai/v1/chat/completions', {
      model: model,
      messages: [{ role: 'user', content: systemPrompt }],
      temperature: expert.temp,
      max_tokens: expert.tokens
    }, { headers: { 'Authorization': `Bearer ${apiKey}` }});
    
    const reply = res.data.choices[0].message.content;
    chat.messages.push({ role: 'assistant', content: reply });
    saveChats();
    renderChatMessages();
    
  } catch(err) {
    console.error(err);
    chat.messages.push({ role: 'assistant', content: "Error: Check API Key or Connection." });
    saveChats();
    renderChatMessages();
  }
});

document.getElementById('confirmExport').addEventListener('click', () => {
  const format = document.getElementById('exportFormat').value;
  const filename = document.getElementById('exportFilename').value || 'chat_export';
  const chat = chatHistory.find(c => c.id === currentChatId);
  if (!chat) return;

  let content = '', mimeType = '';
  switch (format) {
    case 'txt':
      content = `Chat: ${chat.title}\nCreated: ${new Date(chat.createdAt || Date.now()).toLocaleString()}\n\n`;
      chat.messages.forEach(msg => { content += `${msg.sender || msg.role}: ${msg.content}\n\n`; });
      mimeType = 'text/plain';
      break;
    case 'json':
      content = JSON.stringify(chat, null, 2);
      mimeType = 'application/json';
      break;
    case 'html':
      content = `<html><head><title>${chat.title}</title><style>body{font-family:sans-serif;margin:20px;background:#111;color:#eee;}.msg{margin:10px 0;padding:10px;border-radius:5px;}.user{background:#4f46e5;color:white;}.ai{background:#333;}</style></head><body><h1>${chat.title}</h1>${chat.messages.map(msg => `<div class="msg ${msg.role === 'user' ? 'user' : 'ai'}"><strong>${msg.role}:</strong> ${msg.content.replace(/\n/g, '<br>')}</div>`).join('')}</body></html>`;
      mimeType = 'text/html';
      break;
  }

  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${filename}.${format}`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  document.getElementById('exportModal').classList.add('hidden');
});

document.getElementById('cancelExport').onclick = () => document.getElementById('exportModal').classList.add('hidden');

// --- Initialization ---
// Ensure everything loads in correct order
window.addEventListener('DOMContentLoaded', () => {
  loadSettings();
  loadExperts(); // Must happen before populateRoleSelect
  loadProjects(); // Must happen before populateProjectSelect
  initChat();
});

</script>
